aggregator:
  # dump configuration on startup
  echoConfig: true

  # endpoint discovery
  scan:
    # CLARIN centre registry
    centreRegistryUrl: https://centres.clarin.eu/

    # discovery
    maxScanDepth: 3 # recommended 3
    scanTaskInitialDelay: 0
    scanTaskInterval: 12
    scanTaskIntervalTimeUnit: HOURS

    # requests
    maxConcurrentRequests: 4  # @depth2: 1=361s; 2=225s; 4=207s
    requestTimeoutMs: 600_000  # 10min

    # caching for faster startup (on restart tries to use cached resources until new discovery is done)
    cachedResourcesFile: /var/lib/aggregator/fcsAggregatorResources.json
    cachedResourcesBackupFile: /var/lib/aggregator/fcsAggregatorResources.backup.json

  # search requests
  search:
    # requests
    maxConcurrentRequests: 4
    requestTimeoutMs: 30_000  # 30sec

    # search cache
    maxAmountSearchCache: 1_000
    maxAgeSearchCacheMs: 3600_000  # 60min

  # engine shutdown
  executorShutdownTimeoutMs: 1_000

  # endpoint overrides (disabled, side-loading, metadata, request limit override)
  endpointOverrides:
    - url: http://cqlservlet.mpi.nl/
      maxConcurrentSearchRequests: 1
      overrideOnly: true
    # - url: https://clarin.ids-mannheim.de/digibibsru-new
    #   isCQL: true
    #   overrideOnly: false

  # pretty printing REST API responses
  prettyPrintJSON: false

  # AAI/Shibboleth
  auth:
    enabled: ${SHIB_ENABLED:-false}

    keys:
      publicKeyFile: /var/lib/aggregator/publ-jwt.pem
      privateKeyFile: /var/lib/aggregator/priv-jwt.pem
    
    shibWebappHost: ${SERVER_URL:-https://contentsearch.clarin.eu/}
    shibLogin: ${SHIB_LI:-https://contentsearch.clarin.eu/Shibboleth.sso/Login}
    shibLogout: ${SHIB_LO:-https://contentsearch.clarin.eu/Shibboleth.sso/Logout}

  # UI: weblicht (disabled if null)
  weblicht:
    url: https://weblicht.sfs.uni-tuebingen.de/weblicht/?input=
    exportServerUrl: ${SERVER_URL:-https://contentsearch.clarin.eu/}rest/
    acceptedTcfLanguages: [ en, de, nl, fr, it, es, pl ]

  # UI: piwik/matomo
  matomo:
    enabled: ${PIWIK_ENABLED:-true}

    url: ${PIWIK_URL:-https://stats.clarin.eu/}
    siteID: ${PIWIK_SITEID:-20}
    setDomains: ${PIWIK_SETDOMAINS:-['*.contentsearch.clarin.eu']}

  # UI
  searchResultLinkEnabled: ${SEARCH_RESULT_LINK_ENABLED:-false}
  validatorUrl: ${VALIDATOR_URL:-https://www.clarin.eu/fcsvalidator/}

  # rest
  openapiEnabled: ${SWAGGER_ENABLED:-true}
  serverUrl: ${SERVER_URL:-https://contentsearch.clarin.eu/}

# --------------------------------------------------------------------------

# use the simple server factory, run on a single port
server:
  applicationContextPath: /
  type: simple
  #rootPath: '/rest/*'
  connector:
    type: http
    port: 4019

# Logging settings.
logging:
  # The default level of all loggers. Can be OFF, ERROR, WARN, INFO, DEBUG, TRACE, or ALL.
  level: WARN
  # Logger-specific levels.
  loggers:
    eu.clarin.sru.fcs.aggregator: INFO
    eu.clarin.sru.client: WARN

    # scan/search statistics
    # may be used to anonymously collect statistics about endpoint/resource usage
    # intended use case: collection of usage statistics over longer time frames
    # - to provide feedback to endpoint deployers about search behaviour (query type, "search more" requests, general result info (#records))
    # - to improve user interface (do users use resource selection feature or simply keep default) and documentation/help
    #fcsstats:
    #  # explain/search/result sub loggers
    #  # log requests will only be output at TRACE level, any other level will not log anything
    #  level: TRACE
    #  # do not output logs into main/default log
    #  additive: false
    #  # custom output, rotating for each day, for at most a year
    #  appenders:
    #    - type: file
    #      currentLogFilename: /var/log/aggregator/stats/stats.log
    #      archivedLogFilenamePattern: /var/log/aggregator/stats/stats-%d.log.gz
    #      archivedFileCount: 365
    # disabled by:
    fcsstats: WARN

  appenders:
    - type: file
      #currentLogFilename: /var/log/aggregator/access.log
      currentLogFilename: /var/log/aggregator/access.log
      #archivedLogFilenamePattern: /var/log/aggregator/access-%d.log.gz
      archivedLogFilenamePattern: /var/log/aggregator/access-%d.log.gz
      archivedFileCount: 5
#  appenders:
#    - type: console