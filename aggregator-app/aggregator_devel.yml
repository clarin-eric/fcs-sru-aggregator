aggregator:
  # dump configuration on startup
  echoConfig: true

  # endpoint discovery
  scan:
    # CLARIN centre registry
    centreRegistryUrl: https://centres.clarin.eu/

    # discovery
    maxScanDepth: 1 # recommended 3
    scanTaskInitialDelay: 0
    scanTaskInterval: 12
    scanTaskIntervalTimeUnit: HOURS

    # requests
    maxConcurrentRequests: 4 # @depth2: 1=361s; 2=225s; 4=207s
    requestTimeoutMs: 60_000 # 1min

    # caching for faster startup (on restart tries to use cached resources until new discovery is done)
    cachedResourcesFile: fcsAggregatorResources.json
    cachedResourcesBackupFile: fcsAggregatorResources.backup.json

  # search requests
  search:
    # requests
    maxConcurrentRequests: 4
    requestTimeoutMs: 30_000 # 30sec

    # search cache
    maxAmountSearchCache: 1_000
    maxAgeSearchCacheMs: 3600_000 # 60min

  # engine shutdown
  executorShutdownTimeoutMs: 1_000

  # endpoint overrides (disabled, side-loading, metadata, request limit override)
  endpointOverrides:
    # slow endpoints
    - url: http://cqlservlet.mpi.nl/
      maxConcurrentSearchRequests: 1
      enabled: false
      overrideOnly: true
    
    # disabled endpoints
    # - url: http://clarin01.ims.uni-stuttgart.de/SRUCQIBridge
    #   enabled: false

    # new FCS 2.0 endpoints
    # sideloading endpoint with custom name and website
    # - url: https://spraakbanken.gu.se/ws/fcs/2.0/endpoint/korp/sru
    #   name: Språkbanken
    #   website: https://spraakbanken.gu.se/
    #   overrideOnly: false
    # - url: http://localhost:8080/korp-endpoint/sru
    #   overrideOnly: false
    
    # old/legacy endpoints
    # - url: https://clarin.ids-mannheim.de/digibibsru-new
    #   isCQL: true
    #   overrideOnly: false

  # pretty printing REST API responses
  prettyPrintJSON: true

  # AAI/Shibboleth
  auth:
    enabled: ${SHIB_ENABLED:-false}

    # private (+public) keys for JWT exchange (auth info to endpoints)
    keys:
      # Quote ENVVAR if you use something like this which creates whitespaces instead of linebreaks
      #   $ export PUBLIC_KEY=$(cat public-key.pem)
      # You can also create the key like this which creates (escaped) linebreaks "\n" strings
      #   $ export PUBLIC_KEY='-----BEGIN PUBLIC KEY-----\nABC...DEF\n-----END PUBLIC KEY-----'
      #publicKey: '${PUBLIC_KEY}'
      # YOU can also directly embed a key
      publicKey: |
        -----BEGIN PUBLIC KEY-----
        ...
        -----END PUBLIC KEY-----
      # same for privateKey
      privateKey: |
        -----BEGIN PRIVATE KEY-----
        ...
        -----END PRIVATE KEY-----

    # shibboleth integration
    shibWebappHost: ${SERVER_URL:-https://contentsearch.clarin.eu/}
    shibLogin: ${SHIB_LI:-https://contentsearch.clarin.eu/Shibboleth.sso/Login}
    shibLogout: ${SHIB_LO:-https://contentsearch.clarin.eu/Shibboleth.sso/Logout}

  # weblicht (disabled if null)
  weblicht:
    url: https://weblicht.sfs.uni-tuebingen.de/weblicht/?input=
    exportServerUrl: ${SERVER_URL:-https://contentsearch.clarin.eu/}rest/
    acceptedTcfLanguages: [ en, de, nl, fr, it, es, pl ]

  # UI: piwik/matomo
  matomo:
    enabled: ${PIWIK_ENABLED:-false}

    url: ${PIWIK_URL:-https://stats.clarin.eu/}
    siteID: ${PIWIK_SITEID:-20}
    setDomains: ${PIWIK_SETDOMAINS:-['*.contentsearch.clarin.eu']}

  # UI
  searchResultLinkEnabled: ${SEARCH_RESULT_LINK_ENABLED:-true}
  openapiEnabled: ${SWAGGER_ENABLED:-true}
  validatorUrl: ${VALIDATOR_URL:-https://www.clarin.eu/fcsvalidator/}

  # ?
  serverUrl: ${SERVER_URL:-https://contentsearch.clarin.eu/}

# --------------------------------------------------------------------------

# use the simple server factory, run on a single port
server:
  applicationContextPath: /
  type: simple
  connector:
    type: http
    port: 4019

# Logging settings.
logging:
  # The default level of all loggers. Can be OFF, ERROR, WARN, INFO, DEBUG, TRACE, or ALL.
  level: INFO
  # Logger-specific levels.
  loggers:
    eu.clarin.sru.fcs.aggregator: INFO
    eu.clarin.sru.client: WARN
    # DEBUG log print request URLs
    eu.clarin.sru.fcs.aggregator.scan.ScanCrawler: DEBUG
    eu.clarin.sru.fcs.aggregator.search.Search: DEBUG

  appenders:
    - type: console
